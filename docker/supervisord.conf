[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log

[program:xvfb]
command=Xvfb :99 -screen 0 1280x720x24 -ac
autorestart=true
priority=100

[program:vnc]
command=x11vnc -display :99 -forever -shared -rfbport 5900 -nopw
autorestart=true
priority=200

[program:novnc]
command=websockify --web /usr/share/novnc 6080 localhost:5900
autorestart=true
priority=300

[program:wechat]
command=bash -c "sleep 5 && wechat"
environment=DISPLAY=":99"
autorestart=true
priority=400

[program:weflow]
command=bash -c "cd /opt/weflow && ./weflow --no-sandbox --disable-gpu"
environment=DISPLAY=":99",NODE_ENV="production",ONEBOT_PORT="3001"
autorestart=true
priority=500
