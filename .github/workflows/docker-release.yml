name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override version (e.g. 1.3.0). Leave empty for auto-bump.'
        required: false
        type: string
      force_release:
        description: 'Force release even without feat/fix commits'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/flowbot

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      should_release: ${{ steps.bump.outputs.should_release }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump
        id: bump
        shell: bash
        run: |
          # 读取当前容器版本（从 docker/VERSION 获取）
          if [ -f "docker/VERSION" ]; then
            CURRENT=$(cat docker/VERSION | tr -d '[:space:]')
          else
            CURRENT="1.0.0"
          fi

          # 手动指定版本优先
          OVERRIDE="${{ inputs.version_override }}"
          FORCE="${{ inputs.force_release }}"

          if [ -n "$OVERRIDE" ]; then
            echo "Using manual version override: $OVERRIDE"
            echo "new_version=$OVERRIDE" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "bump_type=manual"
            exit 0
          fi

          echo "Current container version: $CURRENT"
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          [ -z "$MINOR" ] && MINOR=0
          [ -z "$PATCH" ] && PATCH=0

          # 检查最近 20 条 commit 决定 bump 类型
          COMMITS=$(git log --oneline -20 --format="%s")

          if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|^[a-z]+(\(.+\))?!:"; then
            NEW_VERSION="$((MAJOR+1)).0.0"
            BUMP_TYPE="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:|^feat:"; then
            NEW_VERSION="${MAJOR}.$((MINOR+1)).0"
            BUMP_TYPE="minor"
          elif echo "$COMMITS" | grep -qiE "^fix(\(.+\))?:|^fix:"; then
            NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH+1))"
            BUMP_TYPE="patch"
          elif [ "$FORCE" = "true" ]; then
            # 强制发布：自动 patch +1
            NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH+1))"
            BUMP_TYPE="patch (forced)"
          else
            # 无关键 commit，不触发 release
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No version-triggering commits found. Skipping release."
            exit 0
          fi

          # 回写新版本到 docker/VERSION
          echo "$NEW_VERSION" > docker/VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docker/VERSION
          git commit -m "chore(release): bump container version to $NEW_VERSION"
          git push

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "should_release=true" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE"
          echo "Bumping container $CURRENT → $NEW_VERSION ($BUMP_TYPE)"

  build-electron:
    name: Build Electron App (Linux)
    runs-on: ubuntu-latest
    needs: bump-version
    if: needs.bump-version.outputs.should_release == 'true'

    steps:
      - name: Check out git repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Ensure linux key helper is executable
        shell: bash
        run: |
          [ -f "resources/key/linux/x64/xkey_helper" ] && chmod +x "resources/key/linux/x64/xkey_helper" || echo "File not found"

      - name: Type Check & Build Frontend
        shell: bash
        run: |
          npx tsc
          npx vite build

      - name: Package Electron App (Linux)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder --linux --x64 '--config.npmRebuild=false'

      - name: Upload linux-unpacked artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-unpacked
          path: release/linux-unpacked/
          retention-days: 1

  build-docker:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    needs: [build-electron, bump-version]
    if: needs.bump-version.outputs.should_release == 'true'

    steps:
      - name: Check out git repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Download linux-unpacked artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-unpacked
          path: release/linux-unpacked/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute lowercase image name
        id: image-name
        shell: bash
        run: |
          LOWER_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=${LOWER_OWNER}/flowbot" >> $GITHUB_OUTPUT
          echo "full=${{ env.REGISTRY }}/${LOWER_OWNER}/flowbot" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.image-name.outputs.full }}:latest
            ${{ steps.image-name.outputs.full }}:v${{ needs.bump-version.outputs.new_version }}
          labels: |
            org.opencontainers.image.title=FlowBOT
            org.opencontainers.image.description=WeChat Linux container with OneBot v11 bridge
            org.opencontainers.image.version=${{ needs.bump-version.outputs.new_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export Docker image to tarball
        shell: bash
        run: |
          IMAGE_REF="${{ steps.image-name.outputs.full }}:latest"
          docker pull "$IMAGE_REF"
          docker save "$IMAGE_REF" | gzip > flowbot-docker.tar.gz

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Draft Release
        id: release_drafter
        uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter.yml
          tag: v${{ needs.bump-version.outputs.new_version }}
          version: ${{ needs.bump-version.outputs.new_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload tarball to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.release_drafter.outputs.tag_name }}" flowbot-docker.tar.gz --clobber
