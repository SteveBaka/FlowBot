name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/flowbot

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      should_release: ${{ steps.bump.outputs.should_release }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump
        id: bump
        shell: bash
        run: |
          # 读取当前容器版本（从 git tag 获取，如 v1.1 → 1.1）
          LATEST_TAG=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "v1.1")
          CURRENT=${LATEST_TAG#v}
          echo "Current container version: $CURRENT"
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          [ -z "$PATCH" ] && PATCH=0

          # 检查最近 20 条 commit 决定 bump 类型
          COMMITS=$(git log --oneline -20 --format="%s")

          if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|^[a-z]+(\(.+\))?!:"; then
            NEW_VERSION="$((MAJOR+1)).0.0"
            BUMP_TYPE="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:|^feat:"; then
            NEW_VERSION="${MAJOR}.$((MINOR+1)).0"
            BUMP_TYPE="minor"
          elif echo "$COMMITS" | grep -qiE "^fix(\(.+\))?:|^fix:"; then
            NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH+1))"
            BUMP_TYPE="patch"
          else
            # 无关键 commit，不触发 release
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No version-triggering commits found. Skipping release."
            exit 0
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "should_release=true" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE"
          echo "Bumping container $CURRENT → $NEW_VERSION ($BUMP_TYPE)"

  build-electron:
    name: Build Electron App (Linux)
    runs-on: ubuntu-latest
    needs: bump-version
    if: needs.bump-version.outputs.should_release == 'true'

    steps:
      - name: Check out git repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Ensure linux key helper is executable
        shell: bash
        run: |
          [ -f "resources/key/linux/x64/xkey_helper" ] && chmod +x "resources/key/linux/x64/xkey_helper" || echo "File not found"

      - name: Type Check & Build Frontend
        shell: bash
        run: |
          npx tsc
          npx vite build

      - name: Package Electron App (Linux)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder --linux --x64 '--config.npmRebuild=false'

      - name: Upload linux-unpacked artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-unpacked
          path: release/linux-unpacked/
          retention-days: 1

  build-docker:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    needs: [build-electron, bump-version]
    if: needs.bump-version.outputs.should_release == 'true'

    steps:
      - name: Check out git repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Download linux-unpacked artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-unpacked
          path: release/linux-unpacked/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute lowercase image name
        id: image-name
        shell: bash
        run: |
          LOWER_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=${LOWER_OWNER}/flowbot" >> $GITHUB_OUTPUT
          echo "full=${{ env.REGISTRY }}/${LOWER_OWNER}/flowbot" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.image-name.outputs.full }}:latest
          labels: |
            org.opencontainers.image.title=FlowBOT
            org.opencontainers.image.description=WeChat Linux container with OneBot v11 bridge
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export Docker image to tarball
        shell: bash
        run: |
          IMAGE_REF="${{ steps.image-name.outputs.full }}:latest"
          docker pull "$IMAGE_REF"
          docker save "$IMAGE_REF" | gzip > flowbot-docker.tar.gz

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Draft Release
        id: release_drafter
        uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload tarball to release
        shell: bash
        run: |
          gh release upload "${{ steps.release_drafter.outputs.tag_name }}" flowbot-docker.tar.gz --clobber
