name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override version (e.g. 1.3.0). Leave empty for auto-bump.'
        required: false
        type: string
      force_release:
        description: 'Force release even without feat/fix commits'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/flowbot

jobs:
  bump-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      should_release: ${{ steps.version.outputs.should_release }}
      weflow_version: ${{ steps.version.outputs.weflow_version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        shell: bash
        run: |
          if [ -f "docker/VERSION" ]; then
            CURRENT=$(cat docker/VERSION | tr -d '[:space:]')
          else
            CURRENT="1.0.0"
          fi

          OVERRIDE="${{ inputs.version_override }}"
          if [ -n "$OVERRIDE" ]; then
            echo "Using manual version override: $OVERRIDE"
            echo "new_version=$OVERRIDE" >> $GITHUB_OUTPUT
          else
            echo "Using version from docker/VERSION: $CURRENT"
            echo "new_version=$CURRENT" >> $GITHUB_OUTPUT
          fi
          echo "should_release=true" >> $GITHUB_OUTPUT

          WEFLOW_VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "weflow_version=${WEFLOW_VERSION}" >> $GITHUB_OUTPUT

  build-electron:
    name: Build Electron App (Linux)
    runs-on: ubuntu-latest
    needs: bump-version
    if: needs.bump-version.outputs.should_release == 'true'

    steps:
      - name: Check out git repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Ensure linux key helper is executable
        shell: bash
        run: |
          [ -f "resources/key/linux/x64/xkey_helper" ] && chmod +x "resources/key/linux/x64/xkey_helper" || echo "File not found"

      - name: Type Check & Build Frontend
        shell: bash
        run: |
          npx tsc
          npx vite build

      - name: Package Electron App (Linux)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder --linux --x64 '--config.npmRebuild=false'

      - name: Upload linux-unpacked artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-unpacked
          path: release/linux-unpacked/
          retention-days: 1

  build-docker:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    needs: [build-electron, bump-version]
    if: needs.bump-version.outputs.should_release == 'true'

    steps:
      - name: Check out git repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Download linux-unpacked artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-unpacked
          path: release/linux-unpacked/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute lowercase image name
        id: image-name
        shell: bash
        run: |
          LOWER_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=${LOWER_OWNER}/flowbot" >> $GITHUB_OUTPUT
          echo "full=${{ env.REGISTRY }}/${LOWER_OWNER}/flowbot" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.image-name.outputs.full }}:latest
            ${{ steps.image-name.outputs.full }}:v${{ needs.bump-version.outputs.new_version }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/flowbot:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/flowbot:v${{ needs.bump-version.outputs.new_version }}
          labels: |
            org.opencontainers.image.title=FlowBOT
            org.opencontainers.image.description=WeChat Linux container with OneBot v11 bridge
            org.opencontainers.image.version=${{ needs.bump-version.outputs.new_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export Docker image to tarball
        shell: bash
        run: |
          IMAGE_REF="${{ steps.image-name.outputs.full }}:latest"
          docker pull "$IMAGE_REF"
          docker save "$IMAGE_REF" | gzip > flowbot-docker.tar.gz

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Draft Release
        id: release_drafter
        uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter.yml
          tag: v${{ needs.bump-version.outputs.new_version }}
          version: ${{ needs.bump-version.outputs.new_version }}
          publish: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload tarball to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.release_drafter.outputs.tag_name }}" flowbot-docker.tar.gz --clobber

      - name: Update release body with variables
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.release_drafter.outputs.tag_name }}"
          WEFLOW_VERSION=${{ needs.bump-version.outputs.weflow_version }}
          IMAGE_REF="${{ steps.image-name.outputs.full }}:v${{ needs.bump-version.outputs.new_version }}"

          gh release view "$TAG" --json body --jq '.body' \
            | sed "s/\$WEFLOW_VERSION/${WEFLOW_VERSION}/g" \
            | sed "s|\$DATE|${{ steps.date.outputs.date }}|g" \
            | sed "s|\$COMMIT|${{ github.sha }}|g" \
            | sed "s|\$IMAGE_REF|${IMAGE_REF}|g" \
            > /tmp/release_body.md

          gh release edit "$TAG" --notes-file /tmp/release_body.md
