name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/flowbot

jobs:
  build-electron:
    name: Build Electron App (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Check out git repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Ensure linux key helper is executable
        shell: bash
        run: |
          [ -f "resources/key/linux/x64/xkey_helper" ] && chmod +x "resources/key/linux/x64/xkey_helper" || echo "File not found"

      - name: Type Check & Build Frontend
        shell: bash
        run: |
          npx tsc
          npx vite build

      - name: Package Electron App (Linux)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder --linux --x64 '--config.npmRebuild=false'

      - name: Upload linux-unpacked artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-unpacked
          path: release/linux-unpacked/
          retention-days: 1

  build-docker:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    needs: build-electron

    steps:
      - name: Check out git repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Download linux-unpacked artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-unpacked
          path: release/linux-unpacked/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute lowercase image name
        id: image-name
        shell: bash
        run: |
          LOWER_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=${LOWER_OWNER}/flowbot" >> $GITHUB_OUTPUT
          echo "full=${{ env.REGISTRY }}/${LOWER_OWNER}/flowbot" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.image-name.outputs.full }}:latest
          labels: |
            org.opencontainers.image.title=FlowBOT
            org.opencontainers.image.description=WeChat Linux container with OneBot v11 bridge
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export Docker image to tarball
        shell: bash
        run: |
          IMAGE_REF="${{ steps.image-name.outputs.full }}:latest"
          docker pull "$IMAGE_REF"
          docker save "$IMAGE_REF" | gzip > flowbot-docker.tar.gz

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          IMAGE_REF="${{ steps.image-name.outputs.full }}:latest"
          TAG="v1.1"
          WEFLOW_VERSION=$(node -e "console.log(require('./package.json').version)")
          RELEASE_TITLE="FlowBOT v1.1"

          gh release create "$TAG" \
            --title "$RELEASE_TITLE" \
            --notes "## FlowBOT v1.1

          **WeFlow Version:** ${WEFLOW_VERSION}
          **Built:** ${{ steps.date.outputs.date }}
          **Commit:** ${{ github.sha }}

          ### Docker Pull
          \`\`\`bash
          docker pull ${IMAGE_REF}
          \`\`\`

          ### Quick Start
          \`\`\`bash
          docker run -d --name flowbot \\
            --cap-add=SYS_PTRACE \\
            -e TZ=Asia/Shanghai \\
            -e VNC_PASSWORD=your_password \\
            -p 7100:7100 \\
            -p 7300:7300 \\
            -p 7600:7600 \\
            ${IMAGE_REF}
          \`\`\`

          ### Ports
          - **7100** - OneBot v11 API
          - **7300** - FlowBOT WebUI
          - **7600** - noVNC virtual desktop

          ### Image Size
          $(du -h flowbot-docker.tar.gz | cut -f1) (compressed tarball)
          " \
            flowbot-docker.tar.gz
